    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Hero / Brand Section -->
<section class="w-full max-w-md bg-surface-container-lowest overflow-hidden">
<div class="relative h-64 w-full">
<img class="w-full h-full object-cover" data-alt="A premium food delivery concept image featuring a modern smartphone displaying a vibrant food app. The background is a brightly lit, minimalist Tanzanian kitchen with warm wooden accents and fresh local ingredients. Soft morning sunlight filters through a window, creating a welcoming and clean light-mode aesthetic with subtle hints of emerald green and golden yellow." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3DA21z6VYtaenYegO6ydTYxHtYORkg1HzTSr_9haQX7Gs87IsWv0KYyK7cPBzXJRRzL7ljV5-EQ9JgezHThXfBAAwAYLLQsyySU4CC_C3vHFGblBSgLpOAGG4qm2or_qZjoFSgf5_sSx5_GQCzNsSxYXE46xn8HWW3EQ9gaHUYh2hJztuC5Xo_0CCPJdOsHuD5lv6FMQcAT6Ypxyrs0O3U7-yHVHOMvlOmxdE92SPRrUdn69M1SL2om1IcBBkz2ycCDytEWmekmM"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute top-md left-container-padding">
<button class="bg-surface/80 backdrop-blur-md p-sm rounded-lg text-on-surface shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
</div>
<!-- Main Card Content -->
<div class="px-container-padding -mt-xl relative z-10">
<div class="bg-surface rounded-t-[32px] pt-xl pb-container-padding shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-lg">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-md shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface text-center">OTP Verification</h1>
<p class="font-body-md text-on-surface-variant text-center mt-sm">
                        Enter the code sent to your number <span class="font-bold text-on-surface">+255 7## ### 123</span>
</p>
</div>
<!-- OTP Input Fields -->
<div class="flex justify-center gap-md mb-xl">
<input class="w-14 h-16 text-center text-h1 font-h1 border-2 border-outline-variant rounded-xl bg-surface-container-low focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="number" value="4"/>
<input class="w-14 h-16 text-center text-h1 font-h1 border-2 border-outline-variant rounded-xl bg-surface-container-low focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" placeholder="·" type="number"/>
<input class="w-14 h-16 text-center text-h1 font-h1 border-2 border-outline-variant rounded-xl bg-surface-container-low focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" placeholder="·" type="number"/>
<input class="w-14 h-16 text-center text-h1 font-h1 border-2 border-outline-variant rounded-xl bg-surface-container-low focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" placeholder="·" type="number"/>
</div>
<!-- Resend Timer Section -->
<div class="flex flex-col items-center gap-sm mb-xl">
<div class="flex items-center gap-xs font-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-sm">schedule</span>
<span>Resend code in <span class="text-secondary font-bold">00:45</span></span>
</div>
<button class="font-label-md text-primary opacity-50 cursor-not-allowed">Resend Now</button>
</div>
<!-- Primary Action Button -->
<div class="space-y-md">
<button class="w-full py-4 bg-primary-container hover:bg-primary text-white font-label-md text-body-lg rounded-[18px] shadow-lg shadow-primary-container/30 transition-all active:scale-95">
                        Verify
                    </button>
<button class="w-full py-4 bg-transparent border-1.5 border-outline-variant text-on-surface-variant font-label-md rounded-[18px] transition-all hover:bg-surface-container-low">
                        Change phone number
                    </button>
</div>
<!-- Security Footer -->
<div class="mt-xl text-center">
<div class="inline-flex items-center gap-xs bg-surface-container-low px-md py-sm rounded-full">
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-sm text-on-surface-variant">Secure verification powered by Piki</span>
</div>
</div>
</div>
</div>
</section>
<!-- Numpad Suggestion (Visual Only for UI) -->
<div class="w-full max-w-md px-container-padding mt-auto mb-lg md:hidden">
<div class="grid grid-cols-3 gap-y-lg text-center py-md">
<div class="font-h1 text-on-surface">1</div>
<div class="font-h1 text-on-surface">2</div>
<div class="font-h1 text-on-surface">3</div>
<div class="font-h1 text-on-surface">4</div>
<div class="font-h1 text-on-surface">5</div>
<div class="font-h1 text-on-surface">6</div>
<div class="font-h1 text-on-surface">7</div>
<div class="font-h1 text-on-surface">8</div>
<div class="font-h1 text-on-surface">9</div>
<div></div>
<div class="font-h1 text-on-surface">0</div>
<div class="flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">backspace</span>
</div>
</div>
</div>
</body></html>
