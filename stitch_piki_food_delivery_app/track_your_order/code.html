<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Order Tracking - Piki Food</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {

            "colors": {
                    "surface-container-high": "#eae7e7",

                    "on-secondary": "#ffffff",

                    "on-primary-fixed": "#00210c",
                    "surface-container-low": "#f6f3f2",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#f3f0ef",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#891933",
                    "tertiary-container": "#ee667b",
                    "inverse-surface": "#313030",
                    "surface": "#fcf9f8",
                    "surface-variant": "#e5e2e1",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#6d7b6d",
                    "primary-container": "#0fa958",
                    "secondary-fixed-dim": "#fabd00",
                    "on-secondary-fixed": "#261a00",
                    "tertiary-fixed-dim": "#ffb2b9",
                    "on-primary-container": "#003416",

                    "tertiary-fixed": "#ffd9dc",

                    "on-tertiary-fixed": "#400010",
                    "secondary": "#785900",

                    "outline-variant": "#bccabb",

            "borderRadius": {

            "spacing": {
                    "base": "8px",
                    "container-padding": "20px",
                    "xl": "32px",
                    "sm": "8px",
                    "md": "16px",
                    "xs": "4px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "h2": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "display": ["Plus Jakarta Sans"],
                    "body-sm": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "h1": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "h2": ["20px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],

                    "display": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],

                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-container {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased overflow-hidden">
<!-- Top AppBar (From Shared Components JSON Logic) -->
<header class="flex items-center justify-between px-container-padding py-md sticky top-0 z-50 w-full bg-surface dark:bg-surface-dim shadow-sm">
<div class="flex items-center gap-sm active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">location_on</span>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Deliver to Current Location</span>
<span class="font-h2 text-h2 text-primary dark:text-primary-fixed-dim">Order #PIKI-8829</span>
</div>
</div>
<div class="flex items-center gap-md">
<button class="p-sm rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help_outline">help_outline</span>
</button>
<button class="p-sm rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="shopping_basket">shopping_basket</span>
</button>
</div>
</header>
<main class="relative h-[calc(100vh-72px)] w-full overflow-hidden">
<!-- Full Screen Map -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[20%] opacity-90" data-alt="A high-resolution, detailed aerial map view of an urban coastal city featuring clear street layouts, green park spaces, and building footprints. The aesthetic is clean and modern with a focus on navigation-friendly colors like muted grays and lush greens, accented by a bright green delivery path indicating the rider's progress. Professional GPS style cartography." data-location="Dar es Salaam" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQVuWwx9JvBuW1FDdXKLGsT46B5J2NwacNfeIhr_u3X0JZXEV1LSoofyQT0Qm100d96sRYGgLVh27pm03kXVy30uH1hJ-Y3pTBX9DaqZRjKzzv_t-VA79es1erFBR5vTJ34zETHnRBYZAaIhyT9ZQtYyFVZw5MBeOzQNUyfUOpaYeL9m3E7l9HOkoIDPg-5a6VYRbTP0yoAP15SyK-CuyN5G8bRtDPosVPEeFqOD3XfElc0BWI0FA27dpryTchBO9v7ZN1kJZGrIw"/>
<!-- Map Overlay UI Elements -->
<div class="absolute top-10 left-1/2 -translate-x-1/2 z-10">
<div class="bg-surface px-lg py-sm rounded-full shadow-lg border border-primary-container/10 flex items-center gap-md">
<div class="flex flex-col items-center">
<span class="font-display text-h1 text-primary">12</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Mins</span>
</div>
<div class="w-[1px] h-8 bg-outline-variant"></div>
<div>
<p class="font-label-md text-label-md text-primary">Estimated Arrival</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Arriving by 14:45</p>
</div>
</div>
</div>
<!-- Custom Map Marker: Rider -->
<div class="absolute top-[45%] left-[40%] z-20">
<div class="relative">
<div class="absolute -inset-4 bg-primary-container/20 rounded-full blur-xl animate-pulse"></div>
<div class="bg-primary text-on-primary p-2 rounded-full shadow-xl border-2 border-white flex items-center justify-center relative">
<span class="material-symbols-outlined" data-icon="pedal_bike" style="font-variation-settings: 'FILL' 1;">pedal_bike</span>
</div>
</div>
</div>
<!-- Custom Map Marker: Destination -->
<div class="absolute top-[65%] left-[60%] z-20">
<div class="bg-tertiary text-on-tertiary p-2 rounded-xl shadow-xl border-2 border-white flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
</div>
</div>
<!-- Floating Card at Bottom -->
<div class="absolute bottom-0 left-0 w-full z-30 px-container-padding pb-xl">
<div class="bg-surface/95 backdrop-blur-md rounded-[24px] shadow-lg border border-white/20 p-md flex flex-col gap-lg">
<!-- Pull Handle -->
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full self-center mb-xs"></div>
<!-- Rider Info Section -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="relative">
<img class="w-14 h-14 rounded-xl object-cover border-2 border-surface-container" data-alt="Close up professional portrait of a friendly male delivery rider wearing a green branded polo shirt. He is smiling warmly, conveying trust and hospitality in a bright, modern studio setting. The lighting is soft and high-key, matching the premium UI aesthetic of the application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAV3lGSnxPjjxZXpGZAkP-alujPGudTmBiwKS75xvZsblbCOrflGE8U778oLJMNEYjTryOuhvT0i-H8faaHCFVQXHpfYzHnR0d98edbn81hoydN4xYEu3xF-puneoaguKtOjLIa5PJbPuytavVWf4p4Z6ERIm4mOpgXHNTBHv3MEM9aJK63lR-d2oJqla-3l5ODQ2rKbe_bQ75xAJE_WEua-3hdXqtrcEvmLUOuqjWr_krkJGgtol83V14eSnOBuCgpMDL96MpDkNU"/>
<div class="absolute -bottom-1 -right-1 bg-secondary-container text-on-secondary-container px-1 rounded-md flex items-center gap-0.5 shadow-sm">
<span class="material-symbols-outlined text-[14px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-sm text-[10px]">4.9</span>
</div>
</div>
<div>
<h3 class="font-h2 text-h2 text-on-surface">Juma Bakari</h3>
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="pedal_bike">pedal_bike</span>
<span class="font-body-sm text-body-sm">Piki-Piki (TZ-384-A)</span>
</div>
</div>
</div>
<div class="flex items-center gap-sm">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high text-primary transition-all active:scale-90 shadow-sm">
<span class="material-symbols-outlined" data-icon="chat">chat</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-primary text-on-primary hover:bg-primary-container transition-all active:scale-90 shadow-sm">
<span class="material-symbols-outlined" data-icon="call">call</span>
</button>
</div>
</div>
<!-- Progress Timeline -->
<div class="flex flex-col gap-md">
<div class="relative flex justify-between items-start pt-xs">
<!-- Progress Track Bar -->
<div class="absolute top-[14px] left-0 w-full h-[3px] bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
<!-- Step 1: Placed -->
<div class="relative flex flex-col items-center gap-sm z-10">
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center ring-4 ring-surface shadow-sm">
<span class="material-symbols-outlined text-[14px] text-on-primary font-bold" data-icon="check">check</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">Ordered</span>
</div>
<!-- Step 2: Preparing -->
<div class="relative flex flex-col items-center gap-sm z-10">
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center ring-4 ring-surface shadow-sm">
<span class="material-symbols-outlined text-[14px] text-on-primary font-bold" data-icon="check">check</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface">Preparing</span>
</div>
<!-- Step 3: On the Way -->
<div class="relative flex flex-col items-center gap-sm z-10">
<div class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center ring-4 ring-surface shadow-md">
<div class="w-2.5 h-2.5 bg-white rounded-full"></div>
</div>
<span class="font-label-md text-label-md text-primary">On the Way</span>
</div>
<!-- Step 4: Arrived -->
<div class="relative flex flex-col items-center gap-sm z-10 opacity-30">
<div class="w-6 h-6 rounded-full bg-surface-container-highest flex items-center justify-center ring-4 ring-surface">
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Arrived</span>
</div>
</div>
</div>
<!-- Secondary Action -->
<button class="w-full py-md px-lg bg-surface-container-low rounded-xl border border-outline-variant/30 flex items-center justify-center gap-md hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="info">info</span>
<span class="font-label-md text-label-md text-on-surface">View Order Details &amp; Receipt</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed as per rules: Task-focused sub-page implies temporary departure from main nav) -->
</body></html>
